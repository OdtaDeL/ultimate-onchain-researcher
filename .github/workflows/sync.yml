name: Daily Data Sync

# Runs the metrics + scoring pipeline on GitHub's runner instead of
# Vercel's serverless functions. Necessary, not a style choice: Vercel's
# Hobby (free) plan hard-caps every serverless function at 10 seconds
# regardless of the `maxDuration` declared in src/app/api/cron/sync/route.ts
# — this pipeline (market metrics across ~2,000+ projects + rescoring)
# takes tens of minutes, so it could never complete there. GitHub Actions
# has no such ceiling (up to 6h per job on the free tier).
#
# ChainBroker sync (projects/funds/funding-rounds/unlocks) is
# DELIBERATELY NOT part of this workflow — confirmed 2026-07-06 that
# ChainBroker's Cloudflare protection consistently blocks every request
# from the GitHub Actions runner IP range (all 4 endpoints failed, full
# retry exhaustion, every attempt), while the same requests succeed fine
# from a residential IP. This is a per-run-environment IP block, not a
# transient outage — retrying from GitHub Actions won't help. ChainBroker
# now only updates the project/funding/unlock catalog via a manual local
# run (`npm run sync:all`, from a machine that can actually reach it);
# this pipeline instead maximizes coverage on whatever projects already
# exist in the DB using sources that DO work from GitHub Actions
# (CoinGecko, DefiLlama, CoinPaprika, DexScreener — none of which are
# Cloudflare-fronted or IP-range-blocked here).
#
# Runs the exact same CLI entrypoints a developer would run locally
# (npm run sync:*) — no duplicate ingestion logic lives in this workflow.

on:
  schedule:
    # 02:00 UTC daily — same schedule vercel.json previously declared.
    - cron: "0 2 * * *"
  # Lets you trigger a run on demand from the Actions tab, without waiting
  # for the schedule or reaching for the CLI locally.
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      # CoinGecko -> DefiLlama -> CoinPaprika -> DexScreener, in that order
      # (CoinPaprika/DexScreener are gap-fillers and must run after
      # CoinGecko — see src/ingestion/metrics/syncMetrics.ts's doc
      # comments on why order matters here).
      - name: Sync market metrics
        run: npm run sync:metrics -- --provider=all

      # Must run last — depends on the metrics data above.
      - name: Recompute scores
        run: npm run sync:scores -- --all
